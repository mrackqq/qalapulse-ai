services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: qalapulse
      POSTGRES_USER: qalapulse
      POSTGRES_PASSWORD: qalapulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qalapulse -d qalapulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://qalapulse:qalapulse@db:5432/qalapulse
      ENABLE_LLM: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./app/static/uploads:/app/app/static/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
