<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page_title or "QalaPulse AI" }}</title>
<meta name="description" content="QalaPulse AI — AI-радар городских проблем Астаны: приоритизация обращений, SLA, карта и отчеты для акимата.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          canvas: "#F6F8FB",
          ink: "#0F172A",
          muted: "#64748B",
          line: "#E2E8F0",
          brand: {
            DEFAULT: "#4F46E5",
            50: "#EEF2FF", 100: "#E0E7FF", 200: "#C7D2FE", 300: "#A5B4FC",
            400: "#818CF8", 500: "#6366F1", 600: "#4F46E5", 700: "#4338CA",
            800: "#3730A3", 900: "#312E81",
          },
          accent: {
            DEFAULT: "#06B6D4",
            50: "#ECFEFF", 100: "#CFFAFE", 400: "#22D3EE", 500: "#06B6D4", 600: "#0891B2",
          },
        },
        fontFamily: {
          sans: ["Inter", "ui-sans-serif", "system-ui", "-apple-system", "Segoe UI", "sans-serif"],
          display: ["Plus Jakarta Sans", "Inter", "ui-sans-serif", "system-ui", "sans-serif"],
        },
        borderRadius: { xl: "14px", "2xl": "18px", "3xl": "24px" },
        boxShadow: {
          soft: "0 1px 2px rgba(15,23,42,0.04), 0 1px 3px rgba(15,23,42,0.06)",
          card: "0 1px 3px rgba(15,23,42,0.04), 0 10px 30px -12px rgba(15,23,42,0.12)",
          lift: "0 8px 24px -10px rgba(15,23,42,0.18)",
          glow: "0 20px 60px -20px rgba(79,70,229,0.45)",
        },
      },
    },
  };
</script>
<style type="text/tailwindcss">
  @layer base {
    html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    body { @apply bg-canvas text-ink font-sans antialiased; }
    h1, h2, h3 { @apply font-display tracking-tight; }
    ::selection { @apply bg-brand-100 text-brand-800; }
  }

  @layer components {
    /* Layout */
    .qp-shell { @apply min-h-screen; }
    .qp-container { @apply mx-auto w-full max-w-[1400px] px-4 sm:px-6 lg:px-8; }

    /* Sidebar */
    .qp-nav-link {
      @apply flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-semibold text-slate-500
             transition-all duration-150 hover:bg-slate-100 hover:text-ink;
    }
    .qp-nav-link svg { @apply h-[18px] w-[18px] shrink-0 text-slate-400 transition-colors; }
    .qp-nav-link:hover svg { @apply text-slate-600; }
    .qp-nav-link.is-active {
      @apply bg-brand-600 text-white shadow-glow hover:bg-brand-600 hover:text-white;
    }
    .qp-nav-link.is-active svg { @apply text-white; }

    /* Buttons */
    .btn {
      @apply inline-flex items-center justify-center gap-2 rounded-xl px-4 py-2.5 text-sm font-bold
             transition-all duration-150 focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-300
             focus-visible:ring-offset-2 focus-visible:ring-offset-white disabled:opacity-60;
    }
    .btn-primary { @apply btn bg-brand-600 text-white shadow-soft hover:bg-brand-700 hover:shadow-lift active:scale-[0.99]; }
    .btn-secondary { @apply btn border border-line bg-white text-slate-700 hover:border-slate-300 hover:bg-slate-50; }
    .btn-danger { @apply btn bg-rose-600 text-white hover:bg-rose-700 active:scale-[0.99]; }
    .btn-accent { @apply btn bg-accent-500 text-white hover:bg-accent-600 active:scale-[0.99]; }
    .btn-dark { @apply btn bg-ink text-white hover:bg-slate-800 active:scale-[0.99]; }
    .btn-ghost { @apply btn text-slate-600 hover:bg-slate-100 hover:text-ink; }
    .btn-sm { @apply px-3 py-1.5 text-xs; }

    /* Cards */
    .qp-card { @apply rounded-2xl border border-line bg-white shadow-card; }
    .qp-card-pad { @apply qp-card p-5 sm:p-6; }
    .qp-card-hover { @apply transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lift; }

    /* Stat / KPI card */
    .stat-card { @apply rounded-2xl border border-line bg-white p-5 shadow-soft transition-all duration-200 hover:shadow-card; }
    .stat-label { @apply text-xs font-bold uppercase tracking-wide text-muted; }
    .stat-value { @apply mt-2 font-display text-3xl font-extrabold tracking-tight text-ink; }
    .stat-foot { @apply mt-1 text-xs font-medium text-muted; }

    /* Eyebrow + section header */
    .eyebrow { @apply inline-flex items-center gap-2 text-xs font-bold uppercase tracking-[0.14em] text-brand-600; }
    .section-title { @apply font-display text-2xl font-extrabold tracking-tight text-ink sm:text-3xl; }
    .section-sub { @apply mt-2 text-sm leading-6 text-muted; }

    /* Badges */
    .badge { @apply inline-flex items-center gap-1.5 rounded-full px-2.5 py-1 text-xs font-bold leading-none; }
    .badge-neutral { @apply badge bg-slate-100 text-slate-600; }
    .badge-brand { @apply badge bg-brand-50 text-brand-700; }
    .badge-accent { @apply badge bg-accent-50 text-accent-600; }
    .badge-soft { @apply badge border border-line bg-white text-slate-600; }
    /* risk */
    .badge-risk-high { @apply badge bg-rose-50 text-rose-700; }
    .badge-risk-medium { @apply badge bg-amber-50 text-amber-700; }
    .badge-risk-low { @apply badge bg-emerald-50 text-emerald-700; }
    /* sla */
    .badge-sla-overdue { @apply badge bg-rose-50 text-rose-700; }
    .badge-sla-due_soon { @apply badge bg-amber-50 text-amber-700; }
    .badge-sla-on_track { @apply badge bg-emerald-50 text-emerald-700; }
    .badge-sla-closed { @apply badge bg-slate-100 text-slate-600; }
    .badge-sla-not_set { @apply badge bg-slate-100 text-slate-500; }
    /* status */
    .badge-status-new { @apply badge bg-blue-50 text-blue-700; }
    .badge-status-in_progress { @apply badge bg-indigo-50 text-indigo-700; }
    .badge-status-resolved { @apply badge bg-emerald-50 text-emerald-700; }
    .badge-status-rejected { @apply badge bg-slate-100 text-slate-600; }
    .dot { @apply h-1.5 w-1.5 rounded-full bg-current; }

    /* Form controls */
    .input, .textarea, .select {
      @apply w-full rounded-xl border border-line bg-white px-3.5 py-2.5 text-sm text-ink shadow-soft
             outline-none transition-all duration-150 placeholder:text-slate-400
             focus:border-brand-400 focus:ring-4 focus:ring-brand-100;
    }
    .textarea { @apply leading-6; }
    .field-label { @apply text-sm font-semibold text-slate-700; }
    .field-hint { @apply text-xs leading-5 text-muted; }

    /* Map */
    .map-shell { @apply overflow-hidden rounded-2xl border border-line bg-slate-100; }
    .map-pane { min-height: 460px; }
    .small-map { min-height: 320px; }
    .hero-map { height: min(74vh, 660px); min-height: 520px; }

    /* Segmented control */
    .seg { @apply inline-flex rounded-xl border border-line bg-slate-50 p-1; }
    .seg-btn { @apply rounded-lg px-3 py-1.5 text-xs font-bold text-slate-500 transition-all duration-150 hover:text-ink; }
    .seg-btn.is-active { @apply bg-white text-ink shadow-soft; }

    /* Table */
    .qp-table { @apply w-full text-left text-sm; }
    .qp-table thead tr { @apply border-b border-line text-xs font-bold uppercase tracking-wide text-muted; }
    .qp-table th { @apply px-4 py-3; }
    .qp-table td { @apply px-4 py-3 align-middle; }
    .qp-table tbody tr { @apply border-b border-slate-100 transition-colors hover:bg-slate-50/70; }

    /* Timeline */
    .timeline { @apply relative space-y-4 pl-6; }
    .timeline::before { content: ""; @apply absolute left-[7px] top-1 bottom-1 w-px bg-line; }
    .timeline-item { @apply relative; }
    .timeline-dot { @apply absolute -left-6 top-1 h-3.5 w-3.5 rounded-full border-2 border-white bg-brand-500 shadow-soft; }

    /* Progress / score */
    .track { @apply h-2 w-full overflow-hidden rounded-full bg-slate-100; }
    .track > span { @apply block h-full rounded-full transition-all duration-500; }

    /* Empty state */
    .empty { @apply rounded-2xl border border-dashed border-line bg-slate-50/60 p-8 text-center; }
  }
</style>
<style>
  .leaflet-container { font: inherit; }
  .leaflet-popup-content-wrapper { border-radius: 16px; box-shadow: 0 12px 40px -12px rgba(15,23,42,.28); padding: 2px; border: 1px solid #E2E8F0; }
  .leaflet-popup-content { margin: 14px 16px; font: inherit; }
  .leaflet-popup-tip { box-shadow: 0 12px 40px -12px rgba(15,23,42,.28); }
  .qp-popup h4 { font-weight: 800; font-size: 13px; margin-bottom: 6px; color: #0F172A; }
  .qp-popup p { font-size: 12px; color: #475569; margin: 2px 0; }
  .qp-popup .qp-popup-link { display:inline-block; margin-top:8px; font-weight:700; font-size:12px; color:#4F46E5; }
  .qp-popup b { color: #0F172A; }
  .marker-cluster { background: rgba(79,70,229,.18); }
  .marker-cluster div { background: #4F46E5; color: #fff; font-weight: 700; font-family: Inter, sans-serif; }
  /* thin scrollbars for inner panels */
  .qp-scroll { scrollbar-width: thin; scrollbar-color: #CBD5E1 transparent; }
  .qp-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
  .qp-scroll::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 999px; }
  @keyframes qp-fade-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .qp-fade { animation: qp-fade-up .4s ease both; }
</style>
